<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>通信工学 学習システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.css"/>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.73.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["numpy", "scipy", "plotly"],
        entrypoint: "app.py",
        files: {
          "app.py": { url: "app.py" }
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
